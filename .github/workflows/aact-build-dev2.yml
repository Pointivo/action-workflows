name: Reusable - AACT Build Dev

on:
  workflow_call:
    inputs:
      imageName:
        required: true
        type: string
      semverFile:
        required: true
        type: string
      buildStage:
        required: false
        type: string
        default: build
      extraBuildArgs:
        required: false
        type: string
      dockerfileDirectory:
        required: false
        type: string
        default: ./
      runner:
        required: false
        type: string
        default: ops-aact-arc-dind

    secrets:
      aws-account-id:
        required: false
      aws-access-key-id:
        required: true
      aws-secret-access-key:
        required: true
      ecr-registry:
        required: true
      github-token:
        required: true
      extra-build-args:
        required: false

jobs:
  build-dev:
    name: "Build Dev"
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      checks: write
      pull-requests: write
    env:
      CACHE_FROM: type=registry,ref=${{ secrets.ecr-registry }}/${{ inputs.imageName }}:buildcache-${{ inputs.buildStage }}
      CACHE_TO: type=registry,ref=${{ secrets.ecr-registry }}/${{ inputs.imageName }}:buildcache-${{ inputs.buildStage }},mode=max,image-manifest=true,oci-mediatypes=true
    defaults:
      run:
        shell: bash
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            git \
            git-lfs \
            jq \
            node-semver

      - name: Install AWS CLI v2
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install
          rm -rf awscliv2.zip aws/

      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker


      - name: Parse semver
        id: semver
        env:
          SEMVER_FILE: ${{ inputs.semverFile }}
        run: |
          set -euo pipefail

          if [ -f ./version.sh ]; then
            SEMVER=$(bash ./version.sh -g)
          else
            major=$(grep -E '^\s*version\.major\s*=' "$SEMVER_FILE" | head -1 | sed -E 's/.*=\s*//' || true)
            minor=$(grep -E '^\s*version\.minor\s*=' "$SEMVER_FILE" | head -1 | sed -E 's/.*=\s*//' || true)
            patch=$(grep -E '^\s*version\.patch\s*=' "$SEMVER_FILE" | head -1 | sed -E 's/.*=\s*//' || true)

            if [ -n "${major}" ] && [ -n "${minor}" ] && [ -n "${patch}" ]; then
              SEMVER="${major}.${minor}.${patch}"
            else
              SEMVER=$(grep -Eo '[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?' "$SEMVER_FILE" | head -1 || true)
            fi
          fi

          [ -n "${SEMVER}" ] || { echo "Unable to determine semver from ./version.sh or ${SEMVER_FILE}"; exit 1; }
          semver "${SEMVER}" >/dev/null
          echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"

      - name: Compute build args metadata
        id: buildmeta
        env:
          SEMVER: ${{ steps.semver.outputs.semver }}
        run: |
          set -euo pipefail
          GIT_SHA_SHORT=$(git rev-parse --short HEAD)
          FULL_SEMVER="${SEMVER}-snapshot+GH${{ github.run_number }}.${GIT_SHA_SHORT}"

          echo "gitShaShort=${GIT_SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "fullSemver=${FULL_SEMVER}" >> "$GITHUB_OUTPUT"

      - name: Generate Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ecr-registry }}/${{ inputs.imageName }}
          tags: |
            type=raw,value=${{ steps.semver.outputs.semver }}_snapshot_GH${{ github.run_number }}.${{ steps.buildmeta.outputs.gitShaShort }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.aws-access-key-id }}
          aws-secret-access-key: ${{ secrets.aws-secret-access-key }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        env:
          ECR_REGION: us-east-1
          ECR_REGISTRY: ${{ secrets.ecr-registry }}
        run: |
          ECR_TOKEN=$(aws ecr get-login-password --region "${ECR_REGION}")
          mkdir -p ~/.docker
          printf '{"auths":{"%s":{"auth":"%s"}}}' \
            "${ECR_REGISTRY}" \
            "$(printf 'AWS:%s' "${ECR_TOKEN}" | base64 -w 0)" \
            > ~/.docker/config.json

      - name: Cached Build Stage
        id: buildstage
        timeout-minutes: 60
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfileDirectory }}/Dockerfile
          target: ${{ inputs.buildStage }}
          cache-from: ${{ env.CACHE_FROM }}
          cache-to: ${{ env.CACHE_TO }}
          build-args: |
            SEMVER=${{ steps.buildmeta.outputs.fullSemver }}
            GIT_SHA_SHORT=${{ steps.buildmeta.outputs.gitShaShort }}
            ${{ inputs.extraBuildArgs }}
            ${{ secrets.extra-build-args }}

      - name: Build Runtime and Push to ECR
        id: push
        timeout-minutes: 60
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfileDirectory }}/Dockerfile
          target: ${{ inputs.imageName }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SEMVER=${{ steps.buildmeta.outputs.fullSemver }}
            GIT_SHA_SHORT=${{ steps.buildmeta.outputs.gitShaShort }}
            ${{ inputs.extraBuildArgs }}
            ${{ secrets.extra-build-args }}
