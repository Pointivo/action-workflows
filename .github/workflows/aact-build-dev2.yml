name: Reusable - AACT Build Dev

on:
  workflow_call:
    inputs:
      push:
        required: false
        type: boolean
        default: true
      image-name:
        required: true
        type: string
      semver-file:
        required: true
        type: string
      build-stage:
        required: false
        type: string
        default: build
      extra-build-args:
        required: false
        type: string
      dockerfile-directory:
        required: false
        type: string
        default: ./
      runner:
        required: false
        type: string
        default: ops-aact-arc-dind
      enable-cache-dance:
        required: false
        type: boolean
        default: true
      cache-map-json:
        required: false
        type: string
        default: ""
      checkout-ref:
        required: false
        type: string
        default: ""
      checkout-depth:
        required: false
        type: number
        default: 1

    secrets:
      aws-account-id:
        required: false
      aws-access-key-id:
        required: true
      aws-secret-access-key:
        required: true
      ecr-registry:
        required: true
      github-token:
        required: true
      docker-secrets:
        required: false

jobs:
  build-dev:
    name: "Build Dev"
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      checks: write
      pull-requests: write
      actions: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          ref: ${{ inputs.checkout-ref || github.ref }}
          fetch-depth: ${{ inputs.checkout-depth }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Restore BuildKit mount cache
        id: buildkit_cache
        if: inputs.enable-cache-dance
        uses: actions/cache@v4
        with:
          path: .buildkit-cache
          key: ${{ runner.os }}-buildkit-${{ inputs.image-name }}-${{ inputs.build-stage }}-${{ hashFiles(format('{0}/Dockerfile', inputs.dockerfile-directory), '**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml', '**/pom.xml', '**/build.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-buildkit-${{ inputs.image-name }}-${{ inputs.build-stage }}-
            ${{ runner.os }}-buildkit-${{ inputs.image-name }}-

      - name: Inject/extract BuildKit cache mounts (auto-discovery)
        if: inputs.enable-cache-dance && inputs.cache-map-json == ''
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          dockerfile: ${{ inputs.dockerfile-directory }}/Dockerfile
          cache-dir: .buildkit-cache
          builder: ${{ steps.buildx.outputs.name }}
          save-always: true

      - name: Inject/extract BuildKit cache mounts (explicit cache-map)
        if: inputs.enable-cache-dance && inputs.cache-map-json != ''
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          cache-map: ${{ inputs.cache-map-json }}
          builder: ${{ steps.buildx.outputs.name }}
          save-always: true

      - name: Parse semver
        id: semver
        env:
          SEMVER_FILE: ${{ inputs.semver-file }}
        run: |
          set -euo pipefail

          if [ -f ./version.sh ]; then
            SEMVER=$(bash ./version.sh -g)
          else
            major=$(grep -E '^\s*version\.major\s*=' "$SEMVER_FILE" | head -1 | sed -E 's/.*=\s*//' || true)
            minor=$(grep -E '^\s*version\.minor\s*=' "$SEMVER_FILE" | head -1 | sed -E 's/.*=\s*//' || true)
            patch=$(grep -E '^\s*version\.patch\s*=' "$SEMVER_FILE" | head -1 | sed -E 's/.*=\s*//' || true)

            if [ -n "${major}" ] && [ -n "${minor}" ] && [ -n "${patch}" ]; then
              SEMVER="${major}.${minor}.${patch}"
            else
              SEMVER=$(grep -Eo '[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?' "$SEMVER_FILE" | head -1 || true)
            fi
          fi

          [ -n "${SEMVER}" ] || { echo "Unable to determine semver from ./version.sh or ${SEMVER_FILE}"; exit 1; }
          semver "${SEMVER}" >/dev/null
          echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"

      - name: Compute build args metadata
        id: buildmeta
        env:
          SEMVER: ${{ steps.semver.outputs.semver }}
        run: |
          set -euo pipefail
          GIT_SHA_SHORT=$(git rev-parse --short HEAD)
          FULL_SEMVER="${SEMVER}-snapshot+GH${{ github.run_number }}.${GIT_SHA_SHORT}"

          echo "gitShaShort=${GIT_SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "fullSemver=${FULL_SEMVER}" >> "$GITHUB_OUTPUT"

      - name: Generate Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ecr-registry }}/${{ inputs.image-name }}
          tags: |
            type=raw,value=${{ steps.semver.outputs.semver }}_snapshot_GH${{ github.run_number }}.${{ steps.buildmeta.outputs.gitShaShort }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}

      - name: Build build stage (warm cache mounts)
        if: inputs.enable-cache-dance
        timeout-minutes: 60
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile-directory }}/Dockerfile
          target: ${{ inputs.build-stage }}
          push: false
          build-args: |
            CI=true
            GITHUB_ACTIONS=true
            SEMVER=${{ steps.buildmeta.outputs.fullSemver }}
            GIT_SHA_SHORT=${{ steps.buildmeta.outputs.gitShaShort }}
            ${{ inputs.extra-build-args }}
          secrets: ${{ secrets.docker-secrets }}

      - name: Build Image and Push to ECR
        id: push
        timeout-minutes: 60
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile-directory }}/Dockerfile
          target: ${{ inputs.image-name }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CI=true
            GITHUB_ACTIONS=true
            SEMVER=${{ steps.buildmeta.outputs.fullSemver }}
            GIT_SHA_SHORT=${{ steps.buildmeta.outputs.gitShaShort }}
            ${{ inputs.extra-build-args }}
          secrets: ${{ secrets.docker-secrets }}

