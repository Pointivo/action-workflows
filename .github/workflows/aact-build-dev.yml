name: Reusable - AACT Build Dev

on:
  workflow_call:
    inputs:
      imageName:
        required: true
        type: string
      semverFile:
        required: true
        type: string
      testPath:
        required: true
        type: string
      buildStatusPath:
        required: true
        type: string
      changeLogFile: # deprecated
        required: false
        type: string
      pullImages:
        required: false
        type: string
      cachedStages:
        required: false
        type: string
      buildStage:
        required: false
        type: string
      releaseStage:
        required: false
        type: string
      extraBuildArgs:
        required: false
        type: string
      releaseTag:
        required: false
        type: string
        default: snapshot
      dockerfileDirectory:
        required: false
        type: string
      dockerfileName:
        required: false
        type: string
      ignore-missing-unit-tests:
        required: false
        type: boolean
        description: When to fail if missing unit tests
        default: false
      ecr-region:
        required: false
        type: string
        default: us-east-1
      enable-shortcut: # temporary
        required: false
        type: boolean
        default: false
      runner:
        required: false
        type: string
        default: ops-aact-arc-general-purpose

    secrets:
      aws-account-id:
        required: false
      aws-access-key-id:
        required: true
      aws-secret-access-key:
        required: true
      ecr-registry:
        required: true
      github-token:
        required: true
      slack-webhook-url:
        required: false
      shortcut-api-token:
        required: false

jobs:
  build-dev:
    name: "Build Dev"
    runs-on: ${{ inputs.runner }}
    container: cruizba/ubuntu-dind
    steps:
      - name: Install Git LFS
        if: contains(inputs.runner, 'arc')
        run: |
          apt-get update
          apt-get install -y \
            git-lfs \
            node-semver

      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.aws-access-key-id }}
          aws-secret-access-key: ${{ secrets.aws-secret-access-key }}
          aws-region: ${{ inputs.ecr-region }}

      - name: Login to Amazon ECR for Pre-Pull Images
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        id: build
        uses: pointivo/action-build@v2
        with:
          imageName: ${{ inputs.imageName }}
          semverFile: ${{ inputs.semverFile }}
          cachedStages: ${{ inputs.cachedStages }}
          pullImages: ${{ inputs.pullImages }}
          extraBuildArgs: ${{ inputs.extraBuildArgs }}
          testPath: ${{ inputs.testPath }}
          buildStatusPath: ${{ inputs.buildStatusPath }}
          releaseTag: ${{ inputs.releaseTag }}
          buildStage: ${{ inputs.buildStage }}
          releaseStage: ${{ inputs.releaseStage }}
          dockerfileDirectory: ${{ inputs.dockerfileDirectory }}
          dockerfileName: ${{ inputs.dockerfileName }}
          githubToken: ${{ secrets.github-token }}

      - name: Publish Unit Test Results
        id: test-results
        if: steps.build.outcome == 'success'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          action_fail: true
          files: |
            build/artifacts/**/*.xml
            !build/artifacts/**/*_cov.xml

      - name: Tag and push image to Amazon ECR
        id: push
        if: steps.test-results.outcome == 'success'
        env:
          REGISTRY: ${{ secrets.ecr-registry }}
          REPOSITORY: ${{ inputs.imageName }}
          IMAGE_TAG: ${{ steps.build.outputs.imageTag }}
        run: |
          echo REGISTRY=$REGISTRY
          echo IMAGE_TAG=$IMAGE_TAG
          echo REPOSITORY=$REPOSITORY
          echo IMAGE_TAG=$IMAGE_TAG
          
          docker tag $REPOSITORY:$IMAGE_TAG $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

# TODO Shortcut integration, Teams notifications
# NOTE We want to do everything in a single job if possible because
#        each job is a separate container and it just adds complexity