name: Reusable - AACT Build Dev

on:
  workflow_call:
    inputs:
      imageName:
        required: true
        type: string
      semverFile:
        required: true
        type: string
      testPath:
        required: true
        type: string
      buildStatusPath:
        required: true
        type: string
      changeLogFile: # deprecated
        required: false
        type: string
      pullImages: # deprecated - no longer used; caching removed for ephemeral builders
        required: false
        type: string
      cachedStages: # deprecated - no longer used; caching removed for ephemeral builders
        required: false
        type: string
      buildStage:
        required: false
        type: string
        default: build
      releaseStage:
        required: false
        type: string
      extraBuildArgs:
        required: false
        type: string
      releaseTag:
        required: false
        type: string
        default: snapshot
      dockerfileDirectory:
        required: false
        type: string
        default: ./
      dockerfileName:
        required: false
        type: string
        default: Dockerfile
      ignore-missing-unit-tests:
        required: false
        type: boolean
        description: When to fail if missing unit tests
        default: false
      ecr-region:
        required: false
        type: string
        default: us-east-1
      runner:
        required: false
        type: string
        default: ops-aact-arc-build
      buildkit-endpoint:
        required: false
        type: string
        default: tcp://localhost:1234
      enable-cache:
        required: false
        type: boolean
        default: true
        description: Enable registry-based BuildKit cache import/export.

    secrets:
      aws-account-id:
        required: false
      aws-access-key-id:
        required: true
      aws-secret-access-key:
        required: true
      ecr-registry:
        required: true
      github-token:
        required: true
      slack-webhook-url:
        required: false
      extra-build-args:
        required: false

jobs:
  build-dev:
    name: "Build Dev"
    runs-on: ${{ inputs.runner }}
    container:
      image: ubuntu:24.04
    permissions:
      contents: read
      checks: write
      pull-requests: write
    env:
      CACHE_FROM: ${{ inputs.enable-cache && format('type=registry,ref={0}/{1}:buildcache', secrets.ecr-registry, inputs.imageName) || '' }}
      CACHE_TO: ${{ inputs.enable-cache && format('type=registry,ref={0}/{1}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true', secrets.ecr-registry, inputs.imageName) || '' }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            curl \
            git \
            git-lfs \
            jq \
            node-semver \
            python3-pip
          pip3 install --break-system-packages awscli

      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Trust workspace for git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory /github/workspace

      - name: Compute build metadata
        id: tag
        env:
          SEMVER_FILE: ${{ inputs.semverFile }}
          RELEASE_TAG: ${{ inputs.releaseTag }}
          IMAGE_NAME: ${{ inputs.imageName }}
          RELEASE_STAGE_INPUT: ${{ inputs.releaseStage }}
        run: |
          set -euo pipefail

          if [ -f ./version.sh ]; then
            SEMVER=$(bash ./version.sh -g)
          else
            major=$(grep -E '^\s*version\.major\s*=' "$SEMVER_FILE" | head -1 | sed -E 's/.*=\s*//' || true)
            minor=$(grep -E '^\s*version\.minor\s*=' "$SEMVER_FILE" | head -1 | sed -E 's/.*=\s*//' || true)
            patch=$(grep -E '^\s*version\.patch\s*=' "$SEMVER_FILE" | head -1 | sed -E 's/.*=\s*//' || true)

            if [ -n "${major}" ] && [ -n "${minor}" ] && [ -n "${patch}" ]; then
              SEMVER="${major}.${minor}.${patch}"
            else
              SEMVER=$(grep -Eo '[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?' "$SEMVER_FILE" | head -1 || true)
            fi
          fi

          [ -n "${SEMVER}" ] || { echo "Unable to determine semver from ./version.sh or ${SEMVER_FILE}"; exit 1; }

          semver "${SEMVER}" >/dev/null

          GIT_SHA_SHORT=$(git rev-parse --short HEAD)
          IMAGE_TAG="${SEMVER}_${RELEASE_TAG}_GH${{ github.run_number }}.${GIT_SHA_SHORT}"
          FULL_SEMVER="${SEMVER}-${RELEASE_TAG}+GH${{ github.run_number }}.${GIT_SHA_SHORT}"
          RELEASE_STAGE="${RELEASE_STAGE_INPUT:-$IMAGE_NAME}"

          echo "imageTag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "fullSemver=${FULL_SEMVER}" >> $GITHUB_OUTPUT
          echo "gitShaShort=${GIT_SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "semver=${SEMVER}" >> $GITHUB_OUTPUT
          echo "releaseStage=${RELEASE_STAGE}" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          echo "GIT_SHA_SHORT=${GIT_SHA_SHORT}" >> $GITHUB_ENV
          echo "SEMVER=${SEMVER}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: remote
          endpoint: ${{ inputs.buildkit-endpoint }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.aws-access-key-id }}
          aws-secret-access-key: ${{ secrets.aws-secret-access-key }}
          aws-region: ${{ inputs.ecr-region }}

      - name: Login to Amazon ECR
        id: login-ecr
        env:
          ECR_REGION: ${{ inputs.ecr-region }}
          ECR_REGISTRY: ${{ secrets.ecr-registry }}
        run: |
          # Write ECR credentials directly to Docker config - no Docker CLI needed.
          ECR_TOKEN=$(aws ecr get-login-password --region "${ECR_REGION}")
          mkdir -p ~/.docker
          printf '{"auths":{"%s":{"auth":"%s"}}}' \
            "${ECR_REGISTRY}" \
            "$(printf 'AWS:%s' "${ECR_TOKEN}" | base64 -w 0)" \
            > ~/.docker/config.json

      - name: Build test/build stage
        id: build-stage
        timeout-minutes: 30
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfileDirectory }}/${{ inputs.dockerfileName }}
          target: ${{ inputs.buildStage }}
          load: true
          tags: build-stage:${{ steps.tag.outputs.imageTag }}
          cache-from: ${{ env.CACHE_FROM }}
          cache-to: ${{ env.CACHE_TO }}
          build-args: |
            SEMVER=${{ steps.tag.outputs.fullSemver }}
            GIT_SHA_SHORT=${{ steps.tag.outputs.gitShaShort }}
            ${{ inputs.extraBuildArgs }}
            ${{ secrets.extra-build-args }}

      - name: Extract test results and build status
        run: |
          set -euo pipefail
          TEST_PATH="${{ inputs.testPath }}"
          BUILD_STATUS_PATH="${{ inputs.buildStatusPath }}"

          # Create container and extract files from build-stage image
          CONTAINER_ID=$(docker create build-stage:${{ steps.tag.outputs.imageTag }})

          # Extract test results
          mkdir -p build/artifacts/test-results
          if docker cp "$CONTAINER_ID:$TEST_PATH/." build/artifacts/test-results/ 2>/dev/null; then
            echo "Extracted test results from $TEST_PATH"
          else
            echo "Warning: Could not extract test results from $TEST_PATH"
          fi

          # Extract build status
          mkdir -p build/build_status
          if docker cp "$CONTAINER_ID:$BUILD_STATUS_PATH" build/build_status/ 2>/dev/null; then
            echo "Extracted build status from $BUILD_STATUS_PATH"
          else
            echo "Warning: Could not extract build status from $BUILD_STATUS_PATH"
          fi

          # Clean up container
          docker rm "$CONTAINER_ID"

      - name: Check build status
        run: |
          STATUS_FILE=$(find build/build_status -type f | head -1)
          if [ -f "$STATUS_FILE" ]; then
            STATUS=$(cat "$STATUS_FILE")
            if [ "${STATUS}" -ne 0 ]; then
              echo "Build stage reported failure (exit code ${STATUS})"
              exit "${STATUS}"
            fi
          fi


      - name: Publish Unit Test Results
        if: always()
        continue-on-error: true
        timeout-minutes: 5
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          action_fail: true
          files: |
            build/artifacts/**/*.xml
            !build/artifacts/**/*_cov.xml

      - name: Build and push release image to ECR
        id: push
        if: success()
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfileDirectory }}/${{ inputs.dockerfileName }}
          target: ${{ steps.tag.outputs.releaseStage }}
          push: true
          tags: ${{ secrets.ecr-registry }}/${{ inputs.imageName }}:${{ steps.tag.outputs.imageTag }}
          cache-from: ${{ env.CACHE_FROM }}
          cache-to: ${{ env.CACHE_TO }}
          build-args: |
            SEMVER=${{ steps.tag.outputs.fullSemver }}
            GIT_SHA_SHORT=${{ steps.tag.outputs.gitShaShort }}
            ${{ steps.tag.outputs.extraBuildArgs }}


