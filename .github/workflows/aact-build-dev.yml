name: Reusable - AACT Build Dev

on:
  workflow_call:
    inputs:
      imageName:
        required: true
        type: string
      semverFile:
        required: true
        type: string
      testPath:
        required: true
        type: string
      buildStatusPath:
        required: true
        type: string
      changeLogFile: # deprecated
        required: false
        type: string
      pullImages: # deprecated - no longer used; caching removed for ephemeral builders
        required: false
        type: string
      cachedStages: # deprecated - no longer used; caching removed for ephemeral builders
        required: false
        type: string
      buildStage:
        required: false
        type: string
        default: build
      releaseStage:
        required: false
        type: string
      extraBuildArgs:
        required: false
        type: string
      releaseTag:
        required: false
        type: string
        default: snapshot
      dockerfileDirectory:
        required: false
        type: string
        default: ./
      dockerfileName:
        required: false
        type: string
        default: Dockerfile
      ignore-missing-unit-tests:
        required: false
        type: boolean
        description: When to fail if missing unit tests
        default: false
      ecr-region:
        required: false
        type: string
        default: us-east-1
      runner:
        required: false
        type: string
        default: ops-aact-arc-general-purpose
      buildkit-endpoint:
        required: false
        type: string
        default: tcp://localhost:1234

    secrets:
      aws-account-id:
        required: false
      aws-access-key-id:
        required: true
      aws-secret-access-key:
        required: true
      ecr-registry:
        required: true
      github-token:
        required: true
      slack-webhook-url:
        required: false

jobs:
  build-dev:
    name: "Build Dev"
    runs-on: ${{ inputs.runner }}
    container:
      image: cruizba/ubuntu-dind
    steps:
      - name: Install Git LFS
        if: contains(inputs.runner, 'arc')
        run: |
          apt-get update
          apt-get install -y \
            git-lfs \
            node-semver

      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Trust workspace for git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory /github/workspace

      - name: Compute image tag
        id: tag
        run: |
          SEMVER=$(cat "${{ inputs.semverFile }}")
          GIT_SHA_SHORT=$(git rev-parse --short HEAD)
          RELEASE_TAG="${{ inputs.releaseTag }}"
          IMAGE_TAG="${SEMVER}_${RELEASE_TAG}_GH${{ github.run_number }}.${GIT_SHA_SHORT}"
          FULL_SEMVER="${SEMVER}-${RELEASE_TAG}+GH${{ github.run_number }}.${GIT_SHA_SHORT}"

          echo "imageTag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "fullSemver=${FULL_SEMVER}" >> $GITHUB_OUTPUT
          echo "gitShaShort=${GIT_SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "semver=${SEMVER}" >> $GITHUB_OUTPUT

          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          echo "GIT_SHA_SHORT=${GIT_SHA_SHORT}" >> $GITHUB_ENV
          echo "SEMVER=${SEMVER}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: remote
          endpoint: ${{ inputs.buildkit-endpoint }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.aws-access-key-id }}
          aws-secret-access-key: ${{ secrets.aws-secret-access-key }}
          aws-region: ${{ inputs.ecr-region }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build test/build stage
        id: build-stage
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfileDirectory }}/${{ inputs.dockerfileName }}
          target: ${{ inputs.buildStage }}
          load: true
          tags: build-stage:${{ steps.tag.outputs.imageTag }}
          build-args: |
            SEMVER=${{ steps.tag.outputs.fullSemver }}
            GIT_SHA_SHORT=${{ steps.tag.outputs.gitShaShort }}
            ${{ inputs.extraBuildArgs }}

      - name: Extract test results and build status
        id: extract
        uses: shrink/actions-docker-extract@v4
        with:
          image: build-stage:${{ steps.tag.outputs.imageTag }}
          path: ${{ inputs.testPath }}/.
          destination: build/artifacts/test-results

      - name: Extract build status
        uses: shrink/actions-docker-extract@v4
        with:
          image: build-stage:${{ steps.tag.outputs.imageTag }}
          path: ${{ inputs.buildStatusPath }}
          destination: build/build_status

      - name: Check build status
        run: |
          STATUS_FILE=$(find build/build_status -type f | head -1)
          if [ -f "$STATUS_FILE" ]; then
            STATUS=$(cat "$STATUS_FILE")
            if [ "${STATUS}" -ne 0 ]; then
              echo "Build stage reported failure (exit code ${STATUS})"
              exit "${STATUS}"
            fi
          fi

      - name: Publish Unit Test Results
        id: test-results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          action_fail: true
          files: |
            build/artifacts/**/*.xml
            !build/artifacts/**/*_cov.xml

      - name: Build and push release image to ECR
        id: push
        if: steps.test-results.outcome == 'success'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfileDirectory }}/${{ inputs.dockerfileName }}
          target: ${{ inputs.releaseStage }}
          push: true
          tags: ${{ secrets.ecr-registry }}/${{ inputs.imageName }}:${{ steps.tag.outputs.imageTag }}
          build-args: |
            SEMVER=${{ steps.tag.outputs.fullSemver }}
            GIT_SHA_SHORT=${{ steps.tag.outputs.gitShaShort }}
            ${{ inputs.extraBuildArgs }}

